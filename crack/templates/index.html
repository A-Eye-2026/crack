<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>홈페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="display-4 mb-4">🏠 메인 페이지</h1>

        {% if session.get('user_id') %}
            <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
                <h3>환영합니다, <strong>{{ session.get('user_name') }}</strong>님!</h3>
                <p class="text-muted">현재 권한: <span class="badge bg-info text-dark">{{ session.get('user_role') }}</span></p>

                <div class="d-grid gap-2 mt-4">
                    {% if session.get('user_role') == 'admin' %}
                        <a href="/admin" class="btn btn-dark">🛠 관리자 페이지 이동</a>
                    {% endif %}
                    <a href="/logout" class="btn btn-outline-danger">로그아웃</a>
                </div>
            </div>
        {% else %}
            <p>로그인이 필요합니다.</p>
            <a href="/login" class="btn btn-primary">로그인하러 가기</a>
        {% endif %}
    </div>
</body>
</html>
