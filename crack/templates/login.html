<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ITS-Guard 로그인</title>
</head>
<body>
    <h2>ITS-Guard 로그인</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul style="color: red;">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div>
            <label>이메일:</label>
            <input type="email" name="email" required placeholder="example@test.com">
        </div>
        <div>
            <label>비밀번호:</label>
            <input type="password" name="password" required>
        </div>

        {% if session.get('login_attempts', 0) < 3 %}
        <button type="submit">로그인</button>
        {% else %}
        <button type="button" disabled>로그인 불가</button>
        <p>3회 실패로 차단되었습니다. 관리자에게 문의하세요.</p>
        <p><a href="/join">회원가입 하러가기</a></p>
        {% endif %}
    </form>
</body>
</html>
