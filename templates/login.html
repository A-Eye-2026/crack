{% extends 'layout.html' %}

{% block title %}Login - Crack{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-brand">
        <i class="bi bi-lightning-charge-fill"></i> CRACK
    </div>

    <div class="auth-card">
        <h2 style="margin-bottom: 8px; font-size: 1.5rem;">로그인</h2>
        <p style="margin-bottom: 30px; opacity: 0.5; font-size: 0.9rem;">신속한 도로 파손 신고와 확인을 위해<br>로그인이 필요합니다.</p>

        {% if error %}
        <p style="color: #FF4D4D; font-size: 0.85rem; margin-bottom: 15px; font-weight: 600;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/login" style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" name="username" placeholder="아이디" required
                style="padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s;">
            <input type="password" name="password" placeholder="비밀번호" required
                style="padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s; margin-bottom: 8px;">

            <button type="submit" class="auth-btn" style="margin-bottom: 0;">
                <i class="bi bi-box-arrow-in-right"></i> 로그인
            </button>
        </form>
    </div>
</div>
{% endblock %}
