<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Kakao Map Test</title>
    <script>console.log("Using Kakao JS Key:", "{{ kakao_js_key }}");</script>
    <script defer
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_key }}&libraries=services&autoload=false"
        onload="window.kakaoSdkLoaded = true" onerror="window.kakaoSdkLoaded = false">
        </script>
</head>

<body>
    <div id="map" style="width:500px;height:400px;background:#eee;">지도가 로드됩니다...</div>
    <script>
        function initMap() {
            var container = document.getElementById('map');
            container.innerHTML = '';
            var options = {
                center: new kakao.maps.LatLng(33.450701, 126.570667),
                level: 3
            };
            var map = new kakao.maps.Map(container, options);
            console.log("지도 생성 성공!");
        }

        function checkSDKAndLoad() {
            if (window.kakaoSdkLoaded === false) {
                document.getElementById('map').innerHTML = '<div style="color:red;padding:20px;">SDK 로드 실패 (403 Forbidden 등 권한 확인 필수)</div>';
                return;
            }
            if (typeof kakao === 'undefined' || !kakao.maps) {
                setTimeout(checkSDKAndLoad, 100);
                return;
            }
            kakao.maps.load(initMap);
        }

        document.addEventListener('DOMContentLoaded', checkSDKAndLoad);
    </script>
</body>

</html>
