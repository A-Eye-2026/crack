{% extends 'layout.html' %}
{% block content %}

<!-- Leaflet (지도 미니 미리보기용) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="py-4">
    <h1 class="display-6 fw-bold text-body-emphasis">포트홀 관리자 대시보드</h1>
    <p class="text-muted mb-4">실시간 신고 현황을 확인하고 처리 상태를 관리하세요.</p>
</div>

<!-- 통계 카드 4개 -->
<div class="row g-4 mb-4 row-cols-2 row-cols-lg-4">
    <div class="col">
        <div class="card shadow-sm text-center">
            <div class="card-body">
                <h2 class="fw-bold" id="total-count">0</h2>
                <p class="text-muted small mb-0">전체 신고</p>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card shadow-sm border-warning text-center">
            <div class="card-body">
                <h2 class="fw-bold text-warning" id="pending-count">0</h2>
                <p class="text-muted small mb-0">검토 대기</p>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card shadow-sm border-success text-center">
            <div class="card-body">
                <h2 class="fw-bold text-success" id="accepted-count">0</h2>
                <p class="text-muted small mb-0">자동 승인</p>
            </div>
        </div>
    </div>
    <div class="col">
        <div class="card shadow-sm border-info text-center">
            <div class="card-body">
                <h2 class="fw-bold text-info" id="done-count">0</h2>
                <p class="text-muted small mb-0">처리 완료</p>
            </div>
        </div>
    </div>
</div>

<!-- 신고 목록 -->
<div class="card shadow-sm mb-5">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0">📋 신고 목록</h5>
            <button class="btn btn-outline-primary btn-sm" onclick="loadReports()">↻ 새로고침</button>
        </div>
        <div id="report-list">
            <div class="text-center text-muted py-5">
                <div style="font-size:2rem;">📭</div>
                신고 데이터를 불러오는 중...
            </div>
        </div>
    </div>
</div>

<!-- 토스트 알림 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body">🔔 새 신고 접수! <span id="toast-body"></span></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script>
    // ── 테스트용 더미 데이터 ──
    var reports = [
        {
            id: 1,
            label: 'pothole',
            confidence: 0.92,
            status: 'auto_accepted',
            latitude: 37.5665,
            longitude: 126.9780,
            address: null,   // 처음엔 null → API로 가져옴
            created_at: '2024-03-09 14:32',
            file_path: 'uploads/sample1.jpg',
            file_type: 'image'
        },
        {
            id: 2,
            label: 'pothole',
            confidence: 0.67,
            status: 'pending',
            latitude: 37.5512,
            longitude: 126.9882,
            address: null,
            created_at: '2024-03-09 15:10',
            file_path: 'uploads/sample2.jpg',
            file_type: 'image'
        },
        {
            id: 3,
            label: 'pothole',
            confidence: 0.88,
            status: 'done',
            latitude: 37.5790,
            longitude: 126.9770,
            address: null,
            created_at: '2024-03-09 13:05',
            file_path: 'uploads/sample3.mp4',
            file_type: 'video'
        }
    ];

    // ── 위도경도 → 주소 변환 (OpenStreetMap Nominatim API) ──
    async function getAddress(lat, lon) {
        try {
            var res  = await fetch(
                'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon,
                { headers: { 'Accept-Language': 'ko' } }
            );
            var data = await res.json();
            return data.display_name || '주소 없음';
        } catch (e) {
            return '주소 변환 실패';
        }
    }

    function getConfBadge(conf) {
        if (conf >= 0.8) return '<span class="badge bg-success">' + (conf*100).toFixed(0) + '%</span>';
        if (conf >= 0.5) return '<span class="badge bg-warning text-dark">' + (conf*100).toFixed(0) + '%</span>';
        return '<span class="badge bg-danger">' + (conf*100).toFixed(0) + '%</span>';
    }

    function getStatusBadge(status) {
        var map = {
            'auto_accepted' : '<span class="badge bg-success">✅ 자동승인</span>',
            'pending'       : '<span class="badge bg-warning text-dark">⏳ 검토대기</span>',
            'done'          : '<span class="badge bg-info text-white">🔵 처리완료</span>',
            'confirmed'     : '<span class="badge bg-primary">📌 확정</span>',
            'in_progress'   : '<span class="badge bg-secondary">🔧 조치중</span>',
            'ai_rejected'   : '<span class="badge bg-danger">❌ 인식오류</span>',
            'review_pending': '<span class="badge bg-warning text-dark">🔍 재검토</span>'
        };
        return map[status] || '<span class="badge bg-secondary">' + status + '</span>';
    }

    function renderCard(r) {
        // 사진 미리보기 or 영상 아이콘
        var mediaHtml = '';
        if (r.file_type === 'image') {
            mediaHtml = '<img src="/' + r.file_path + '" alt="신고사진" ' +
                'class="img-fluid rounded mb-2" ' +
                'style="width:100%; max-height:180px; object-fit:cover;" ' +
                'onerror="this.style.display=\'none\'">';
        } else {
            mediaHtml = '<div class="text-center py-3 bg-light rounded mb-2">' +
                '<span style="font-size:2rem;">🎥</span>' +
                '<div class="text-muted small mt-1">영상 파일</div></div>';
        }

        // 액션 버튼
        var actionHtml = '';
        if (r.status === 'pending' || r.status === 'review_pending') {
            actionHtml =
                '<button class="btn btn-success btn-sm me-1" onclick="updateStatus(' + r.id + ', \'confirmed\')">✅ 승인</button>' +
                '<button class="btn btn-danger btn-sm" onclick="updateStatus(' + r.id + ', \'ai_rejected\')">❌ 반려</button>';
        } else if (r.status === 'confirmed') {
            actionHtml = '<button class="btn btn-secondary btn-sm" onclick="updateStatus(' + r.id + ', \'in_progress\')">🔧 조치시작</button>';
        } else if (r.status === 'in_progress') {
            actionHtml = '<button class="btn btn-info btn-sm text-white" onclick="updateStatus(' + r.id + ', \'done\')">✔ 완료처리</button>';
        }

        return '<div class="card mb-3 shadow-sm" id="card-' + r.id + '">' +
            '<div class="card-body">' +
            '<div class="row g-3">' +

            // 왼쪽: 사진/영상
            '<div class="col-md-3">' + mediaHtml + '</div>' +

            // 오른쪽: 정보
            '<div class="col-md-9">' +
            '<div class="d-flex justify-content-between align-items-start mb-2">' +
            '<div>' +
            '<span class="text-muted small">#' + r.id + ' · ' + r.created_at + '</span><br>' +
            '<strong>' + r.label + '</strong>' +
            '</div>' +
            '<div class="text-end">' +
            getStatusBadge(r.status) +
            '</div>' +
            '</div>' +

            // 주소
            '<div class="mb-2">' +
            '<span class="text-muted small">📍 </span>' +
            '<span class="small" id="addr-' + r.id + '">주소 불러오는 중...</span><br>' +
            '<span class="text-muted small">🌐 위도 ' + r.latitude + ' / 경도 ' + r.longitude + '</span>' +
            '</div>' +

            // AI 신뢰도
            '<div class="mb-2">' +
            '<span class="small text-muted">AI 신뢰도: </span>' + getConfBadge(r.confidence) +
            '<span class="small text-muted ms-2">파일: </span>' +
            '<span class="badge bg-light text-dark border">' + (r.file_type === 'image' ? '📸 사진' : '🎥 영상') + '</span>' +
            '</div>' +

            // 액션 버튼
            '<div>' + actionHtml + '</div>' +
            '</div>' +

            '</div>' +
            '</div>' +
            '</div>';
    }

    function updateStats() {
        document.getElementById('total-count').textContent    = reports.length;
        document.getElementById('pending-count').textContent  = reports.filter(function(r) { return r.status === 'pending' || r.status === 'review_pending'; }).length;
        document.getElementById('accepted-count').textContent = reports.filter(function(r) { return r.status === 'auto_accepted' || r.status === 'confirmed'; }).length;
        document.getElementById('done-count').textContent     = reports.filter(function(r) { return r.status === 'done'; }).length;
    }

    async function loadReports() {
        // TODO: fetch('/report/list') 로 교체
        var list = document.getElementById('report-list');
        if (reports.length === 0) {
            list.innerHTML = '<div class="text-center text-muted py-5"><div style="font-size:2rem">📭</div>신고 내역이 없어요</div>';
            return;
        }
        list.innerHTML = reports.map(renderCard).join('');
        updateStats();

        // 각 신고의 주소 비동기로 가져오기
        for (var i = 0; i < reports.length; i++) {
            var r = reports[i];
            var addrEl = document.getElementById('addr-' + r.id);
            if (addrEl) {
                var addr = await getAddress(r.latitude, r.longitude);
                addrEl.textContent = addr;
            }
        }
    }

    function updateStatus(id, newStatus) {
        // TODO: Flask API 호출로 교체
        var r = reports.find(function(r) { return r.id === id; });
        if (r) { r.status = newStatus; loadReports(); }
    }

    function showToast(report) {
        document.getElementById('toast-body').textContent =
            report.label + ' · 신뢰도 ' + (report.confidence*100).toFixed(0) + '%';
        var toast = new bootstrap.Toast(document.getElementById('liveToast'));
        toast.show();
    }

    loadReports();
</script>

{% endblock %}
