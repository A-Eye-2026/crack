{% extends 'layout.html' %}

{% block content %}
<style>
    /* 실제 표가 들어가는 컨테이너 */
    .board-box {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
    }

    /* 글쓰기 버튼 스타일 */
    .btn-custom-write {
        background-color: var(--accent) !important;
        border: none !important;
        color: white !important;
        font-weight: 600;
        font-size: 0.95rem !important;
        padding: 8px 20px !important;
        transition: all 0.2s ease-in-out;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1) !important;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .btn-custom-write:hover {
        background-color: var(--primary-brown-dark) !important;
        transform: translateY(-2px);
        color: white !important;
    }

    /* 타이틀과 버튼의 끝선 정렬 */
    .board-header-flex {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        width: 100%;
        margin-bottom: 1.5rem !important;
    }

    /* 테이블 래퍼에 수평 스크롤 추가 (모바일 대응) */
    .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* 모바일 대응 */
    @media (max-width: 991px) {
        .board-box {
            margin: 0 15px;
            max-width: none;
            width: auto;
        }
    }
</style>

<div class="container mt-4">
    <div class="board-box">
        <div class="board-header-flex">
            <h3 class="fw-bold m-0" style="font-size: 1.5rem; letter-spacing: -0.5px;">
                <i class="bi bi-chat-dots"></i> 자유 게시판
            </h3>
            <a href="/board/write" class="btn btn-custom-write rounded-pill">
                <i class="bi bi-pencil-fill" style="font-size: 0.8rem;"></i> 글쓰기
            </a>
        </div>

        <div class="shadow-sm table-wrapper"
            style="border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06);">
            <table class="table table-hover text-center m-0" style="border-top: 3px solid var(--accent);">
                <thead class="table-light">
                    <tr>
                        <th style="width: 10%; padding: 20px 0;">번호</th>
                        <th style="width: 45%; padding: 20px 0;">제목</th>
                        <th style="width: 15%; padding: 20px 0;">작성자</th>
                        <th style="width: 15%; padding: 20px 0;">날짜</th>
                        <th style="width: 15%; padding: 20px 0;">추천</th>
                    </tr>
                </thead>
                <tbody>
                    {% for b in boards %}
                    <tr>
                        <td class="py-3 align-middle">{{ b.id }}</td>
                        <td class="text-start ps-4 py-3 align-middle">
                            <a href="/board/view/{{ b.id }}" class="text-decoration-none fw-bold"
                                style="font-size: 1.05rem;">
                                {{ b.title }}
                            </a>
                        </td>
                        <td class="py-3 align-middle">{{ b.writer_name }}</td>
                        <td class="py-3 align-middle text-muted small">
                            {{ b.created_at.strftime('%Y-%m-%d') if b.created_at }}
                        </td>
                        <td class="py-3 align-middle">
                            <span class="like-btn-board" style="cursor: pointer; color: #ff4757;"
                                onclick="toggleLike({{ b.id }}, 'board', this)">
                                <i class="bi {{ 'bi-heart-fill' if b.is_liked else 'bi-heart' }}"></i>
                                <span class="like-count">{{ b.likes_count | default(0) }}</span>
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function toggleLike(postId, postType, el) {
        fetch('/api/like', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ post_id: postId, post_type: postType })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const heartIcon = el.querySelector('i');
                    const countSpan = el.querySelector('.like-count');

                    if (data.action === 'added') {
                        heartIcon.classList.replace('bi-heart', 'bi-heart-fill');
                    } else {
                        heartIcon.classList.replace('bi-heart-fill', 'bi-heart');
                    }
                    countSpan.innerText = data.count;
                } else {
                    if (data.message === '로그인이 필요합니다.') {
                        if (confirm('좋아요를 누르려면 로그인이 필요합니다. 로그인 하시겠습니까?')) {
                            window.location.href = '/login';
                        }
                    } else {
                        alert(data.message);
                    }
                }
            });
    }
</script>
{% endblock %}
