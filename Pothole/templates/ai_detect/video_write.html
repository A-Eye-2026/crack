{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="mx-auto" style="max-width: 650px;">
        <div class="text-center mb-5">
            <h2 class="fw-bold"
                style="font-family: 'Orbitron', sans-serif; color: var(--text-primary); letter-spacing: 1px;">Video AI
                Analyzer</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">영상을 업로드하고 강력한 AI 모델로 프레임 단위 객체를 탐지하세요.</p>
        </div>

        <div class="card border-0 shadow-lg" style="border-radius: 24px; background: var(--bg-card); padding: 40px;">
            <form id="videoForm" action="/ai-detect/video/process" method="post" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: var(--text-primary);">영상 제목</label>
                    <input type="text" name="title" class="form-control form-control-lg"
                        style="border-radius: 12px; background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-primary);"
                        required placeholder="분석할 영상의 제목을 입력하세요">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: var(--text-primary);">영상 설명 (선택사항)</label>
                    <textarea name="content" class="form-control" rows="3"
                        style="border-radius: 12px; background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-primary);"
                        placeholder="영상에 대한 추가적인 설명을 남길 수 있습니다."></textarea>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold" style="color: var(--text-primary);">영상 파일</label>
                    <div class="upload-area text-center position-relative mt-2"
                        style="border: 2px dashed var(--accent); border-radius: 16px; padding: 40px 20px; background: var(--bg-input); cursor: pointer; transition: all 0.3s ease;">
                        <input type="file" name="video" id="videoInput"
                            class="position-absolute top-0 start-0 w-100 h-100 opacity-0" accept="video/*"
                            style="cursor: pointer; z-index: 10;" required>
                        <div id="uploadPlaceholder">
                            <i class="bi bi-film display-4" style="color: var(--accent);"></i>
                            <h5 class="mt-3 mb-1" id="fileNamer" style="color: var(--text-primary);">영상을 이곳에 드래그하거나
                                클릭하세요</h5>
                            <p class="small m-0" style="color: var(--text-muted);">지원 형식: MP4, AVI, MOV 등</p>
                        </div>
                    </div>
                </div>

                <button type="submit" id="subBtn"
                    class="btn btn-primary w-100 py-3 rounded-pill fw-bold fs-5 shadow-sm btn-submit"
                    style="letter-spacing: 1px;">
                    <i class="bi bi-cpu me-2"></i> AI 분석 시작하기
                </button>
            </form>

            <div id="loading" class="text-center mt-4"
                style="display:none; padding: 30px; border-radius: 16px; background: var(--bg-hover);">
                <div class="spinner-border mb-3" style="color: var(--accent); width: 3rem; height: 3rem;" role="status">
                </div>
                <h5 style="color: var(--text-primary); font-family: 'Orbitron', sans-serif;">PROCESSING...</h5>
                <p class="mt-2 mb-0" style="color: var(--text-muted);">AI가 영상을 프레임 단위로 분석 중입니다.<br>영상 길이에 따라 수십 초 내외가
                    소요될 수 있습니다.</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('videoInput').addEventListener('change', function (e) {
        var fileName = e.target.files[0].name;
        document.getElementById('fileNamer').innerText = "선택된 파일: " + fileName;
    });

    document.getElementById('videoForm').onsubmit = function () {
        document.getElementById('subBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
    };
</script>

<style>
    .upload-area:hover {
        background: var(--bg-hover) !important;
        transform: translateY(-2px);
    }

    .btn-submit {
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(164, 120, 100, 0.4) !important;
    }
</style>
{% endblock %}
