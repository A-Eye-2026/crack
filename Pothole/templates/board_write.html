{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">새 글 작성</h2>
        <form action="/board/write" method="POST" enctype="multipart/form-data" id="writeForm">
            <div class="mb-3">
                <label class="form-label">제목</label>
                <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label">이미지 첨부 (최대 4MB)</label>
                <input type="file" name="image" class="form-control" accept="image/*" id="imageInput">
                <div id="imagePreview" class="mt-2" style="display: none;">
                    <img src="" alt="게시글 업로드 이미지 미리보기" class="img-thumbnail" style="max-height: 200px;">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">내용</label>
                <textarea name="content" class="form-control" rows="10" placeholder="내용을 입력하세요" required></textarea>
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-primary">등록하기</button>
                <a href="/board" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
            // 용량 체크 (4MB)
            if (file.size > 4 * 1024 * 1024) {
                alert('파일 크기는 4MB를 초과할 수 없습니다. (Vercel 페이로드 제한)');
                this.value = '';
                document.getElementById('imagePreview').style.display = 'none';
                return;
            }

            // 미리보기
            const reader = new FileReader();
            reader.onload = function (event) {
                const preview = document.getElementById('imagePreview');
                preview.querySelector('img').src = event.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('writeForm').addEventListener('submit', function (e) {
        const title = this.title.value.trim();
        const content = this.content.value.trim();
        if (!title || !content) {
            alert('제목과 내용을 모두 입력해주세요.');
            e.preventDefault();
        }
    });
</script>
{% endblock %}
