{% extends 'layout.html' %}

{% block content %}
<div class="row mt-4">
    <div class="col-12 col-lg-10 mx-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-pencil-square"></i> 내가 작성한 게시글</h2>
            <a href="/mypage" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-arrow-left me-1"></i> 마이페이지
            </a>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light" style="background: rgba(245,245,245,0.5) !important;">
                        <tr>
                            <th class="ps-4 py-3" style="width: 10%">번호</th>
                            <th class="py-3" style="width: 60%">제목</th>
                            <th class="pe-4 py-3 text-center" style="width: 30%">작성일</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for post in posts %}
                        <tr style="cursor: pointer;" onclick="location.href='/board/view/{{ post.id }}'">
                            <td class="ps-4">{{ post.id }}</td>
                            <td class="fw-bold text-dark">
                                <a href="/board/view/{{ post.id }}" class="text-decoration-none text-dark">
                                    {{ post.title }}
                                </a>
                            </td>
                            <td class="text-center text-muted pe-4">
                                {{ post.created_at.strftime('%Y-%m-%d %H:%M') if post.created_at }}
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="py-5 text-center text-muted">
                                <i class="bi bi-journal-x display-4 mb-3 d-block opacity-50"></i>
                                아직 작성한 게시글이 없습니다. 첫 글을 남겨보세요!
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    /* Cart Layout Style Copy */
    .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1.5px solid rgba(255, 255, 255, 0.7);
        border-radius: 20px;
        box-shadow:
            0 4px 6px rgba(0, 0, 0, 0.07),
            0 12px 40px rgba(0, 0, 0, 0.15),
            0 0 0 1px rgba(0, 0, 0, 0.06),
            inset 0 1px 0 rgba(255, 255, 255, 0.8);
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .glass-card:hover {
        transform: translateY(-2px);
        box-shadow:
            0 6px 10px rgba(0, 0, 0, 0.09),
            0 20px 50px rgba(0, 0, 0, 0.18),
            0 0 0 1px rgba(0, 0, 0, 0.07),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .table-hover tbody tr:hover {
        background-color: rgba(0, 0, 0, 0.02);
    }
</style>
{% endblock %}
