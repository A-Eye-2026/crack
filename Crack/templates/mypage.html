{% extends 'layout.html' %}

{% block title %}My Page - Crack{% endblock %}

{% block content %}
<div class="profile-section card" style="text-align: center; padding: 40px 24px; margin-bottom: 24px;">
    <div
        style="width: 100px; height: 100px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: var(--point-orange);">
        <i class="bi bi-person-fill" style="font-size: 3rem;"></i>
    </div>
    <h2 style="font-size: 1.5rem; margin-bottom: 4px;">{{ session.get('user_name', 'Guest User') }}</h2>
    <p style="font-size: 0.9rem; opacity: 0.5; margin-bottom: 24px;">{{ '관리자 계정' if session.get('user_id') == 1 else '일반
        유저' }}</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div style="background: #fdfdfd; padding: 16px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.03);">
            <strong style="display: block; font-size: 1.2rem; color: var(--point-orange);">12</strong>
            <span style="font-size: 0.75rem; opacity: 0.5;">나의 신고</span>
        </div>
        <div style="background: #fdfdfd; padding: 16px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.03);">
            <strong style="display: block; font-size: 1.2rem; color: var(--point-orange);">4</strong>
            <span style="font-size: 0.75rem; opacity: 0.5;">처리 완료</span>
        </div>
    </div>
</div>

<div class="menu-list" style="margin-top: 12px;">
    <div class="card" style="padding: 0; overflow: hidden; border-radius: 24px;">
        <div
            style="padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.03);">
            <span>알림 설정</span>
            <i class="bi bi-chevron-right" style="opacity: 0.3;"></i>
        </div>
        <div
            style="padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.03);">
            <span>고객 센터</span>
            <i class="bi bi-chevron-right" style="opacity: 0.3;"></i>
        </div>
        <div
            style="padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; color: #FF4D4D;">
            <a href="/logout" style="color: inherit; text-decoration: none; width: 100%;">로그아웃</a>
        </div>
    </div>
</div>
{% endblock %}
